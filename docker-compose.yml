# Único servicio: ml-service (FastAPI :8000). N8n/Postgres/MinIO van aparte.
# Desde ~/proyecto_tesis:  docker compose up -d --build
# En n8n usar: http://172.17.0.1:8000  o http://TU_IP:8000/v1/...

services:
  parkinson-ml:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    image: parkinson-ml:latest
    container_name: parkinson-ml
    restart: unless-stopped
    ports:
      - "8000:8000"
