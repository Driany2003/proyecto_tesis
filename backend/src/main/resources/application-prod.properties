server.port=8081
server.servlet.context-path=/api

spring.datasource.url=jdbc:postgresql://localhost:5432/tesis_parkinson
spring.datasource.username=giomar
spring.datasource.password=giomar2003@


spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Peticiones HTTP: por defecto Spring no escribe "una línea por request" en el log.
# /var/log/parkinson.log es solo la salida de la app; aquí dejamos access log de Tomcat
# (crear: sudo mkdir -p /opt/parkinson/tomcat-work && sudo chown -R parkinson:parkinson /opt/parkinson/tomcat-work)
# Ver:   sudo tail -f /opt/parkinson/tomcat-work/logs/access_log.*.log
server.tomcat.basedir=/opt/parkinson/tomcat-work
server.tomcat.accesslog.enabled=true
server.tomcat.accesslog.pattern=%h %l %u %t "%r" %s %b %D

jwt.secret=your-256-bit-secret-change-in-production-min-32-chars
jwt.expiration-ms=86400000

app.minio.endpoint=http://localhost:9000
