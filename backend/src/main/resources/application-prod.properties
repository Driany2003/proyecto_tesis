server.port=${SERVER_PORT:8081}
server.servlet.context-path=/api

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/tesis_parkinson}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.datasource.hikari.maximum-pool-size=${SPRING_DATASOURCE_POOL_MAX:10}
spring.datasource.hikari.minimum-idle=${SPRING_DATASOURCE_POOL_MIN:2}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

jwt.secret=${JWT_SECRET:prod-secret-change-me-256-bit-min}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

app.minio.endpoint=${MINIO_ENDPOINT:http://localhost:9000}
app.minio.public-endpoint=${MINIO_PUBLIC_ENDPOINT:http://localhost:9000}
app.minio.access-key=${MINIO_ACCESS_KEY:minioadmin}
app.minio.secret-key=${MINIO_SECRET_KEY:minioadmin}

app.n8n.webhook-url=${N8N_WEBHOOK_URL:http://localhost:5678/webhook/parkinson/analyze}
app.webhook.recording-secret=${WEBHOOK_RECORDING_SECRET:changeme}

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
