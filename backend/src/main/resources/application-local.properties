# Perfil local: PostgreSQL + MinIO + n8n en localhost (docker compose en raíz del repo).
# Arranque: docker compose up -d  luego  ./mvnw spring-boot:run -Dspring-boot.run.profiles=local

spring.datasource.url=jdbc:postgresql://localhost:5432/tesis_parkinson
spring.datasource.username=parkinson
spring.datasource.password=parkinson_local
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true

spring.datasource.hikari.leak-detection-threshold=60000

jwt.secret=your-256-bit-secret-change-in-production-min-32-chars
jwt.expiration-ms=86400000

app.minio.endpoint=http://127.0.0.1:9000
app.minio.access-key=minioadmin
app.minio.secret-key=minioadmin
app.minio.bucket=parkinsonvoicesdata
app.minio.presign-get-minutes=120

# Mismo n8n que en el VPS (backend en tu PC llamando al servidor). Si usas n8n solo en Docker local, cambia a http://127.0.0.1:5678/webhook/parkinson/analyze
app.n8n.webhook-url=http://5.78.157.191:5678/webhook/parkinson/analyze
