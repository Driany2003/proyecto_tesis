spring.profiles.active=dev

# Backup configuration
app.backup.enabled=${BACKUP_ENABLED:true}
app.backup.schedule=${BACKUP_SCHEDULE:0 0 2 * * *}
app.backup.retention-days=${BACKUP_RETENTION_DAYS:30}
app.backup.storage-path=${BACKUP_STORAGE_PATH:./backups}
app.backup.pg_dump-path=${PG_DUMP_PATH:/usr/bin/pg_dump}
app.backup.pg_restore-path=${PG_RESTORE_PATH:/usr/bin/pg_restore}
