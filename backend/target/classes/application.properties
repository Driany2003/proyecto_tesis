# Application
spring.application.name=parkinson-backend
server.port=8080
server.servlet.context-path=/api

# Perfil por defecto: dev (PostgreSQL en la IP)
spring.profiles.active=dev

# JPA (ddl-auto lo define cada perfil: dev, prod)
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# JWT (override in application-dev.properties or env)
jwt.secret=your-256-bit-secret-change-in-production-min-32-chars
jwt.expiration-ms=86400000

# CORS will be allowed for frontend origin (see WebConfig)
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000

spring.datasource.url=jdbc:postgresql://5.78.157.191:5432/tesis_parkinson
spring.datasource.username=giomar
spring.datasource.password=giomar2003@
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP (pool que usa Spring Boot por defecto con JPA). Sin esto el máximo suele ser 10 por proceso.
# Menos conexiones = menos "too many clients" si corres varias instancias o compartes el mismo Postgres.
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
# Devuelve al servidor conexiones inactivas en el pool (ms). Mínimo efectivo en Hikari: 10000.
spring.datasource.hikari.idle-timeout=60000
# Cierra y reabre conexiones periódicamente para no dejar sesiones vivas indefinidamente.
spring.datasource.hikari.max-lifetime=900000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.pool-name=parkinson-pool

# Subida de grabaciones (multipart)
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=55MB

# MinIO (objetos de audio)
app.minio.endpoint=http://5.78.157.191:9000
app.minio.access-key=giomar
app.minio.secret-key=giomar2003@
app.minio.bucket=parkinsonvoicesdata
app.minio.presign-get-minutes=120

# n8n — workflow ACTIVO; usar Production URL (/webhook/...), no /webhook-test/ (solo pruebas en el editor).
# Vacío = no dispara n8n (solo MinIO + BD).
app.n8n.webhook-url=http://5.78.157.191:5678/webhook/parkinson/analyze
